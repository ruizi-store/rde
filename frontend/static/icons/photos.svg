<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="photo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="50%" style="stop-color:#7E57C2"/>
      <stop offset="100%" style="stop-color:#EC407A"/>
    </linearGradient>
    <linearGradient id="sun-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEE58"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <linearGradient id="mount-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#43A047"/>
    </linearGradient>
  </defs>
  <!-- 照片底框 -->
  <rect x="6" y="10" width="52" height="44" rx="6" fill="url(#photo-grad)"/>
  <!-- 内部白色区域 -->
  <rect x="10" y="14" width="44" height="36" rx="3" fill="#FFFFFF"/>
  <!-- 太阳 -->
  <circle cx="44" cy="26" r="7" fill="url(#sun-grad)"/>
  <!-- 山峰 -->
  <path d="M10 50 L26 32 L36 42 L44 30 L54 50 Z" fill="url(#mount-grad)"/>
  <!-- 小山 -->
  <path d="M10 50 L18 40 L26 50 Z" fill="#81C784"/>
</svg>
