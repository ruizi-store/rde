                depends_on:
                    affine_migration:
                        condition: service_completed_successfully
                environment:
                    - REDIS_SERVER_HOST=${PANEL_REDIS_HOST}
                    - REDIS_SERVER_PORT=6379
                    - REDIS_SERVER_PASSWORD=${PANEL_REDIS_ROOT_PASSWORD}
