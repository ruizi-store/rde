<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="clockFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cdd6f4"/>
      <stop offset="100%" style="stop-color:#bac2de"/>
    </linearGradient>
  </defs>
  <!-- 表盘 -->
  <circle cx="32" cy="32" r="28" fill="url(#clockFace)" stroke="#313244" stroke-width="3"/>
  <!-- 刻度 -->
  <line x1="32" y1="8" x2="32" y2="12" stroke="#313244" stroke-width="2"/>
  <line x1="32" y1="52" x2="32" y2="56" stroke="#313244" stroke-width="2"/>
  <line x1="8" y1="32" x2="12" y2="32" stroke="#313244" stroke-width="2"/>
  <line x1="52" y1="32" x2="56" y2="32" stroke="#313244" stroke-width="2"/>
  <!-- 时针 -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#1e1e2e" stroke-width="3" stroke-linecap="round"/>
  <!-- 分针 -->
  <line x1="32" y1="32" x2="44" y2="26" stroke="#45475a" stroke-width="2" stroke-linecap="round"/>
  <!-- 中心 -->
  <circle cx="32" cy="32" r="3" fill="#f38ba8"/>
</svg>
