      description:
        en: A powerful tool for building and deploying AI-powered agents and workflows
        zh: 用于构建和部署 AI 驱动的智能体与工作流的强大工具
      form:
        - key: CONTAINER_NAME
          label:
            en: Container Name
            zh: 容器名称
          default: langflow
          required: true
          type: text
          env_key: CONTAINER_NAME
        - key: PANEL_APP_PORT_HTTP
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 7860
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTP
        - key: PANEL_DB_USER
          label:
            en: Username
            zh: 用户名
          default: admin
          required: true
          type: text
          env_key: PANEL_DB_USER
        - key: PANEL_DB_USER_PASSWORD
          label:
            en: Password
            zh: 密码
          default: abcdefghijklmnop
          required: true
          type: password
          env_key: PANEL_DB_USER_PASSWORD
        - key: PANEL_DB_HOST
          label:
            en: Access URL
            zh: 访问地址
          default: http://localhost
          type: text
          env_key: PANEL_DB_HOST
        - key: PANEL_DB_PORT
          label:
            en: Port
            zh: 端口
          default: 8080
          required: true
          type: number
          env_key: PANEL_DB_PORT
        - key: PANEL_DB_NAME
          label:
            en: App Name
            zh: 应用名称
          default: langflow
          required: true
          type: text
          env_key: PANEL_DB_NAME
      homepage: https://langflow.org/
      icon: langflow.png
      id: langflow
      name: Langflow
      platform: docker
      repository: https://github.com/langflow-ai/langflow
      tags:
        - ai
      title:
        en: Langflow
        zh: Langflow
