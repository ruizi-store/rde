    - architectures:
        - amd64
      author: litespeedtech
      category: other
      compose:
        networks:
            default:
                external: true
                name: rde-network
        services:
            litespeed:
                container_name: ${CONTAINER_NAME}
                environment:
                    - TZ=${TIME_ZONE}
                image: litespeedtech/openlitespeed:1.8.4-lsphp81
                labels:
                    createdBy: Apps
                networks:
                    - default
                ports:
                    - ${PANEL_APP_PORT_HTTP_80}:80
                    - ${PANEL_APP_PORT_HTTPS}:443
                    - ${PANEL_APP_PORT_HTTPS}:443/udp
                    - ${PANEL_APP_PORT_HTTP}:7080
                restart: always
                volumes:
                    - ./data/lsws/conf:/usr/local/lsws/conf
                    - ./data/lsws/admin-conf:/usr/local/lsws/admin/conf
                    - ./data/bin/container:/usr/local/bin
                    - ./data/sites:/var/www/vhosts/
                    - ./data/acme:/root/.acme.sh/
                    - ./data/logs:/usr/local/lsws/logs/
      description:
        en: A high-performance, lightweight, open source HTTP server
        zh: 高性能、轻量级、开源的 HTTP 服务器
      form:
        - key: CONTAINER_NAME
          label:
            en: Container Name
            zh: 容器名称
          default: openlitespeed
          required: true
          type: text
          env_key: CONTAINER_NAME
        - key: PANEL_APP_PORT_HTTP_80
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 80
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTP_80
        - key: PANEL_APP_PORT_HTTPS
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 443
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTPS
        - key: PANEL_APP_PORT_HTTP
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 7080
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTP
        - key: TIME_ZONE
          label:
            en: Tz
            zh: Tz
          type: text
          env_key: TIME_ZONE
      homepage: https://openlitespeed.org
      icon: openlitespeed.png
      id: openlitespeed
      name: OpenLiteSpeed
      platform: docker
      repository: https://github.com/litespeedtech/openlitespeed
      tags:
        - web-服务器
      title:
        en: OpenLiteSpeed
        zh: OpenLiteSpeed
      version: 1.8.4-lsphp81
