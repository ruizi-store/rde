          default: http://localhost
          type: text
          env_key: PANEL_DB_HOST
        - key: PANEL_DB_PORT
          label:
            en: Port
            zh: 端口
          default: 8080
          required: true
          type: number
          env_key: PANEL_DB_PORT
        - key: PANEL_DB_NAME
          label:
            en: App Name
            zh: 应用名称
          default: gitea
          required: true
          type: text
          env_key: PANEL_DB_NAME
        - key: PANEL_DB_USER
          label:
