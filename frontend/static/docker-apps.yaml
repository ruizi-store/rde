      author: shuzhiyinhang
      category: database
      compose:
        networks:
            default:
                external: true
                name: rde-network
        services:
            vexdb:
                container_name: ${CONTAINER_NAME}
                environment:
                    - GS_USERNAME=${PANEL_DB_ROOT_USER}
                    - GS_PASSWORD=${PANEL_DB_ROOT_PASSWORD}
                    - USER_PRIVILEGE=sysadmin
                    - DBCOMPATIBILITY=A
                healthcheck:
                    interval: 30s
                    retries: 5
                    start_period: 20s
                    test:
                        - CMD
                        - pg_isready
                        - -h
                        - 127.0.0.1
                        - -p
                        - "5432"
                        - -q
                        - -U
                        - ${PANEL_DB_ROOT_USER}
                    timeout: 5s
                image: shuzhiyinhang/vexdb:3.0.0.28146
                networks:
                    - default
                ports:
                    - ${PANEL_APP_PORT_HTTP}:5432
                restart: always
                volumes:
                    - ./data/data:/home/postgres/data
                    - ./data/etc:/home/postgres/vexdb/etc
      description:
        en: Vector database with relational data and semantic search
        zh: 融合关系数据能力、多路语义检索能力的向量数据库
      form:
        - key: CONTAINER_NAME
          label:
            en: Container Name
            zh: 容器名称
          default: vexdb
          required: true
          type: text
          env_key: CONTAINER_NAME
        - key: PANEL_APP_PORT_HTTP
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 5432
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTP
        - key: PANEL_DB_ROOT_USER
          label:
            en: Username
            zh: 用户名
          default: admin
          required: true
          type: text
          env_key: PANEL_DB_ROOT_USER
        - key: PANEL_DB_ROOT_PASSWORD
          label:
            en: Password
            zh: 密码
          default: abcdefghijklmnop
          required: true
          type: password
          env_key: PANEL_DB_ROOT_PASSWORD
