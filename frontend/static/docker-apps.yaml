                    interval: 30s
                    retries: 5
                    start_period: 20s
                    test:
                        - CMD
                        - pg_isready
                        - -h
                        - 127.0.0.1
                        - -p
                        - "5432"
                        - -q
                        - -U
                        - postgres
                    timeout: 5s
                image: bitnamilegacy/postgresql:17
                labels:
                    createdBy: Apps
                networks:
                    - default
                ports:
                    - ${PANEL_APP_PORT_HTTP}:5432
                restart: always
                volumes:
                    - ./postgresql:/bitnami/postgresql
                    - ./data:/bitnami/postgresql/conf
