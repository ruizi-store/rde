apps:
    - architectures:
        - amd64
        - arm64
      category: storage
      compose:
        networks:
            default:
                external: true
                name: rde-network
        services:
            mongodb:
                container_name: ${CONTAINER_NAME}
                environment:
                    MONGO_INITDB_ROOT_PASSWORD: ${PANEL_DB_ROOT_PASSWORD}
                    MONGO_INITDB_ROOT_USERNAME: ${PANEL_DB_ROOT_USER}
                image: mongo:8.2.5
                labels:
                    createdBy: Apps
                networks:
                    - default
                ports:
                    - ${PANEL_APP_PORT_HTTP}:27017
                restart: always
                volumes:
                    - ./data:/data/db
      description:
        en: Fractional file storage database
        zh: 分段文件存储数据库
      form:
        - key: CONTAINER_NAME
          label:
            en: Container Name
            zh: 容器名称
          default: mongodb
          required: true
          type: text
          env_key: CONTAINER_NAME
        - key: PANEL_APP_PORT_HTTP
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 27017
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTP
        - key: PANEL_DB_ROOT_USER
          label:
            en: Username
            zh: 用户名
          default: admin
          required: true
          type: text
          env_key: PANEL_DB_ROOT_USER
        - key: PANEL_DB_ROOT_PASSWORD
          label:
            en: Password
            zh: 密码
          default: abcdefghijklmnop
          required: true
          type: password
          env_key: PANEL_DB_ROOT_PASSWORD
      homepage: https://www.mongodb.com/
      icon: mongodb.png
      id: mongodb
      license: SSPL-1.0
      name: MongoDB
      platform: docker
      repository: https://github.com/mongodb/mongo
      tags:
        - database
      title:
        en: MongoDB
        zh: MongoDB
      version: 8.2.5
    - architectures:
        - amd64
        - arm64
      author: halcyonazure
      category: other
      compose:
        networks:
            default:
                external: true
                name: rde-network
        services:
            lskypro:
                container_name: ${CONTAINER_NAME}
                environment:
                    - WEB_PORT=8089
                image: halcyonazure/lsky-pro-docker:latest
                labels:
                    createdBy: Apps
                networks:
                    - default
                ports:
                    - ${PANEL_APP_PORT_HTTP}:8089
                restart: always
                volumes:
                    - ./data:/var/www/html/
      description:
        en: An image bed program for uploading and managing images online
        zh: 用于在线上传、管理图片的图床程序
      form:
        - key: CONTAINER_NAME
          label:
            en: Container Name
            zh: 容器名称
          default: lsky-pro
          required: true
          type: text
          env_key: CONTAINER_NAME
        - key: PANEL_APP_PORT_HTTP
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 8089
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTP
      homepage: https://hub.docker.com/r/halcyonazure/lsky-pro-docker
      icon: lsky-pro.png
      id: lsky-pro
      name: Lsky-pro
      platform: docker
      repository: https://github.com/lsky-org/lsky-pro
      tags:
        - 云存储
      title:
        en: Lsky-pro
        zh: Lsky-pro
      version: latest
    - architectures:
        - amd64
        - arm64
      author: langflowai
      category: ai
      compose:
        networks:
            default:
                external: true
                name: rde-network
        services:
            langflow:
                container_name: ${CONTAINER_NAME}
                environment:
                    - LANGFLOW_DATABASE_URL=postgresql://${PANEL_DB_USER}:${PANEL_DB_USER_PASSWORD}@${PANEL_DB_HOST}:${PANEL_DB_PORT}/${PANEL_DB_NAME}
