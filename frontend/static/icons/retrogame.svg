<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="retro-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#retro-grad)"/>
  <!-- 游戏手柄主体 -->
  <rect x="15" y="24" width="34" height="18" rx="9" fill="white"/>
  <!-- 左侧方向键 -->
  <rect x="20" y="30" width="8" height="3" rx="1" fill="#6366F1"/>
  <rect x="22" y="27" width="3" height="8" rx="1" fill="#6366F1"/>
  <!-- 右侧按钮 -->
  <circle cx="40" cy="30" r="2.5" fill="#EF4444"/>
  <circle cx="45" cy="33" r="2.5" fill="#22C55E"/>
  <circle cx="40" cy="36" r="2.5" fill="#3B82F6"/>
  <circle cx="35" cy="33" r="2.5" fill="#F59E0B"/>
  <!-- 中间按钮 -->
  <rect x="28" y="31" width="5" height="2" rx="1" fill="#9CA3AF"/>
  <!-- 像素装饰 -->
  <rect x="18" y="18" width="3" height="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="43" y="18" width="3" height="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="30" y="45" width="4" height="3" fill="rgba(255,255,255,0.2)"/>
</svg>
