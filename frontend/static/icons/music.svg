<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="music-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC407A"/>
      <stop offset="50%" style="stop-color:#AB47BC"/>
      <stop offset="100%" style="stop-color:#7E57C2"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFEE58"/>
      <stop offset="100%" style="stop-color:#FF7043"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#music-grad)"/>
  <!-- 唱片外圈 -->
  <circle cx="32" cy="32" r="20" fill="rgba(0,0,0,0.2)"/>
  <circle cx="32" cy="32" r="18" fill="#1a1a2e"/>
  <!-- 唱片纹理 -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- 唱片中心 -->
  <circle cx="32" cy="32" r="6" fill="url(#wave-grad)"/>
  <circle cx="32" cy="32" r="2" fill="#1a1a2e"/>
  <!-- 音波装饰 -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M46 22 Q50 27, 50 32 Q50 37, 46 42"/>
    <path d="M50 18 Q56 25, 56 32 Q56 39, 50 46"/>
  </g>
  <!-- 播放三角 -->
  <path d="M29 26 L29 38 L39 32 Z" fill="white" opacity="0.95"/>
</svg>
