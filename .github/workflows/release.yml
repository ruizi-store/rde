name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Debian build tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev debhelper

      - name: Update changelog version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "1s/([^)]*)/($VERSION-1)/" debian/changelog

      - name: Build DEB package
        run: dpkg-buildpackage -us -uc -b -d

      - name: Collect artifacts
        run: |
          mkdir -p outputs
          mv ../rde_*.deb outputs/ 2>/dev/null || true
          ls -lh outputs/

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          cat <<'EOF' > release_notes.md
          ## What's New

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/debian/changelog) for details.

          ## Install

          ```bash
          sudo dpkg -i rde_*.deb
          sudo apt-get install -f
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDE ${{ steps.notes.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: outputs/rde_*.deb
