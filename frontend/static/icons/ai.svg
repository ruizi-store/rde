<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#ai-grad)"/>
  <!-- 机器人头部 -->
  <rect x="20" y="20" width="24" height="20" rx="4" fill="white"/>
  <!-- 眼睛 -->
  <circle cx="27" cy="28" r="3" fill="#06B6D4"/>
  <circle cx="37" cy="28" r="3" fill="#8B5CF6"/>
  <!-- 微笑 -->
  <path d="M26 34 Q32 38 38 34" stroke="#6366F1" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 天线 -->
  <line x1="32" y1="20" x2="32" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="3" fill="white"/>
  <!-- 身体指示灯 -->
  <rect x="26" y="42" width="12" height="6" rx="2" fill="white"/>
  <circle cx="29" cy="45" r="1.5" fill="#06B6D4"/>
  <circle cx="35" cy="45" r="1.5" fill="#8B5CF6"/>
</svg>
