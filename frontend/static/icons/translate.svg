<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="translate-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#translate-grad)"/>
  <!-- 内容居中: A(-14) + 箭头(0) + 文(+14) -->
  <g transform="translate(32, 32)">
    <text x="-14" y="6" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">A</text>
    <path d="M-5 0 L5 0 M2 -4 L6 0 L2 4" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="14" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">文</text>
  </g>
</svg>
