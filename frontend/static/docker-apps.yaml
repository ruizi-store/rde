      author: uusec
      category: security
      compose:
        networks:
            default:
                external: true
                name: rde-network
        services:
            uuwaf:
                container_name: ${CONTAINER_NAME}
                depends_on:
                    wafdb:
                        condition: service_healthy
                environment:
                    - UUWAF_MYSQL_PASSWORD=Safe3.WAF
                    - UUWAF_RESOLVER=resolver 127.0.0.11 valid=30s ipv6=off;
                image: uusec/waf:7.1.1
                networks:
                    - default
                ports:
                    - ${PANEL_APP_PORT_HTTP1}:80
                    - ${PANEL_APP_PORT_HTTPS2}:443
                    - ${PANEL_APP_PORT_HTTPS}:4443
                ulimits:
                    nofile:
                        hard: 102400
                        soft: 102400
                    nproc: 65535
                volumes:
                    - /etc/localtime:/etc/localtime:ro
                    - ./waf_config:/uuwaf/web/conf
                    - ./waf_acme:/uuwaf/acme
                    - ./waf_logs:/uuwaf/logs
            wafdb:
                command:
                    - --max_connections=512
                container_name: ${CONTAINER_NAME}-db
                environment:
                    - MYSQL_ROOT_PASSWORD=Safe3.WAF
                healthcheck:
                    interval: 5s
                    retries: 10
                    start_period: 3s
                    test:
                        - CMD
                        - mysqladmin
                        - -uroot
                        - -pSafe3.WAF
                        - ping
                        - -h
                        - 127.0.0.1
                        - --silent
                    timeout: 3s
                image: mysql:5.7.44
                networks:
                    - default
                volumes:
                    - /etc/timezone:/etc/timezone:ro
                    - /etc/localtime:/etc/localtime:ro
                    - ./waf_data:/var/lib/mysql
      description:
        en: UUSEC Web Application Firewall
        zh: 南墙 WEB 应用防火墙
      form:
        - key: CONTAINER_NAME
          label:
            en: Container Name
            zh: 容器名称
          default: uuwaf
          required: true
          type: text
          env_key: CONTAINER_NAME
        - key: PANEL_APP_PORT_HTTP1
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 80
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTP1
        - key: PANEL_APP_PORT_HTTPS2
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 443
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTPS2
        - key: PANEL_APP_PORT_HTTPS
          label:
            en: HTTP Port
            zh: HTTP 端口
          default: 4443
          required: true
          type: number
          env_key: PANEL_APP_PORT_HTTPS
