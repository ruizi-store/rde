name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Debian build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper
          # arm64 交叉编译需要 dpkg 支持目标架构
          if [ "${{ matrix.arch }}" != "amd64" ]; then
            sudo dpkg --add-architecture ${{ matrix.arch }}
          fi

      - name: Update changelog version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "1s/([^)]*)/($VERSION)/" debian/changelog

      - name: Build DEB package
        run: dpkg-buildpackage -us -uc -b -d -a${{ matrix.arch }}

      - name: Collect artifacts
        run: |
          mkdir -p outputs
          mv ../rde_*.deb outputs/ 2>/dev/null || true
          ls -lh outputs/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rde-${{ matrix.arch }}
          path: outputs/rde_*.deb

  release:
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          cat <<'EOF' > release_notes.md
          ## What's New

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/debian/changelog) for details.

          ## Install

          ```bash
          sudo apt-get install ./rde_*.deb
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDE ${{ steps.notes.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: outputs/rde_*.deb
