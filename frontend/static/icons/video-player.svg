<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="video-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7E57C2"/>
      <stop offset="50%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E3F2FD"/>
    </linearGradient>
    <linearGradient id="film-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#video-grad)"/>
  <!-- 胶片边框 -->
  <rect x="12" y="16" width="40" height="32" rx="4" fill="url(#film-grad)"/>
  <!-- 胶片孔 - 左侧 -->
  <rect x="14" y="19" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="14" y="25" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="14" y="31" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="14" y="37" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="14" y="43" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- 胶片孔 - 右侧 -->
  <rect x="46" y="19" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="46" y="25" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="46" y="31" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="46" y="37" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="46" y="43" width="4" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- 播放按钮 -->
  <circle cx="32" cy="32" r="12" fill="rgba(255,255,255,0.2)"/>
  <polygon points="28,24 28,40 42,32" fill="url(#play-grad)"/>
</svg>
